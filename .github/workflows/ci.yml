name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        ruby-version: ['3.2', '3.3', '3.4', '4.0']

    name: Ruby ${{ matrix.ruby-version }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby ${{ matrix.ruby-version }}
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby-version }}
          bundler-cache: true

      - name: Fix default gem directory permissions
        run: |
          # Bundler 4.0 refuses to reinstall default gems when the parent
          # directory is world-writable without sticky bit (InsecureInstallPathError).
          # GitHub Actions runners may have permissive permissions on the Ruby
          # gem directory. Set the sticky bit to satisfy Bundler's security check.
          gem_dir=$(ruby -e 'puts Gem.default_dir')
          if [ -d "$gem_dir/gems" ]; then
            chmod +t "$gem_dir/gems" 2>/dev/null || true
          fi

      - name: Run tests
        run: bundle exec rspec
